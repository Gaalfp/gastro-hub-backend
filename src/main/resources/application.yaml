spring:
  application:
    name: gastro-hub
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/techchallenge2}
    username: ${DB_USERNAME:fiap_user}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS app;
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: app
        format_sql: true
    show-sql: false