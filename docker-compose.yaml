version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tech_challenge_db
    environment:
      POSTGRES_DB: techchallenge2
      POSTGRES_USER: fiap_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: tech_challenge_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/techchallenge2
      - SPRING_DATASOURCE_USERNAME=fiap_user
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db

volumes:
  postgres_data: